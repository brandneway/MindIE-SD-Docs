site_name: MindIE SD 文档
site_url: https://mindie-sd.readthedocs.io/zh-cn/latest/
site_description: MindIE SD - 昇腾多模态加速系列套件中文文档
site_author: Huawei Technologies Co., Ltd.

docs_dir: docs/zh
site_dir: site

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/git-alt

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html

nav:
  - 首页: index.md
  - 快速开始:
      - 安装指导: installation.md
      - 快速开始: quick_start.md
  - 加速特性:
      - 架构设计: architecture.md
      - 稀疏加速: features/sparse.md
      - 量化特性: features/quantization.md
      - 核心算子: features/core_layers.md
      - 编译加速: features/compilation.md
      - 并行策略: features/parallelism.md
      - 以存代算: features/cache.md
      - CPU卸载: features/cpu_offload.md
      - 显存共享: features/share_memory.md
      - DyEPLB: features/DyEPLB.md
  - 开发者指南:
      - 构建指南: developer_guide/build_guide.md
      - 测试指南: developer_guide/test.md
      - 工具与文档: developer_guide/tooling.md
  - 附录:
      - 支持矩阵: features/supported_matrix.md
  - 社区:
      - 社区治理: community/governance.md

extra_css:
  - mkdocs/extra.css

hooks:
  - docs/mkdocs/hooks.py