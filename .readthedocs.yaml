version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  commands:
    - pip install -r docs/requirements-docs.txt
    - cd docs && SPHINX_LANGUAGE=zh python -m sphinx -b html -c . zh $READTHEDOCS_OUTPUT/html/zh
    - cd docs && SPHINX_LANGUAGE=en python -m sphinx -b html -c . en $READTHEDOCS_OUTPUT/html/en
    - |
      cat > $READTHEDOCS_OUTPUT/html/index.html << 'EOF'
      <!DOCTYPE html>
      <html>
      <head>
        <meta http-equiv="refresh" content="0; url=zh/index.html">
        <title>MindIE SD Documentation</title>
      </head>
      <body>
        <p>Redirecting to <a href="zh/index.html">Chinese documentation</a>...</p>
        <p>English version: <a href="en/index.html">English documentation</a></p>
      </body>
      </html>
      EOF
